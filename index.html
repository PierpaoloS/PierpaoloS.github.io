<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Test AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 20px 20px;
      opacity: 0.85;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background: #222;
    }
  </style>
</head>
<body>
  <h1>Test AR</h1>
  <p>Tocca il pulsante AR da telefono compatibile.</p>

  <model-viewer
    src="modelloNew.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>
</body>
</html>
